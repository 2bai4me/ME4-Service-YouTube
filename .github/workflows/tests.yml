name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Python 3.11 / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-asyncio

      - name: Prepare writable WSL-style fixture root
        run: |
          sudo mkdir -p /mnt/d
          sudo chown "$USER":"$USER" /mnt/d

      - name: Run test suite
        run: python -m pytest -q
